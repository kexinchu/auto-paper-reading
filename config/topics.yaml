      - "discrete diffusion"
      - "masking diffusion"
      - "non-autoregressive"
      - "consistency model"

  - id: "ai-safety"
    name: "AI系统安全与对抗"
    description: "关注AI/LLM系统安全：prompt注入、越狱攻击/防御、模型窃取、数据泄露、RAG/Agent安全漏洞、红队评测。排除传统网络安全、密码学、非AI领域的安全研究。"
    keywords:
      - "prompt injection"
      - "jailbreak"
