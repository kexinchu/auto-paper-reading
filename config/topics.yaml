topics:
  - id: "llm-opt"
    name: "大语言模型训练与推理系统优化"
    description: "关注LLM训练/推理的系统级优化：KV-Cache、Attention加速、量化/稀疏/剪枝的工程落地、并行与调度、Serving系统、端到端吞吐/延迟优化。排除纯算法型压缩、纯理论分析、以及在法律/生物/金融等垂直领域的LLM应用。"
    keywords:
      - "LLM serving"
      - "LLM inference"
      - "inference system"
      - "KV cache"
      - "KV-cache"
      - "paged attention"
      - "flash attention"
      - "FlashAttention"
      - "attention kernel"
      - "CUDA kernel"
      - "kernel fusion"
      - "quantization"
      - "INT8"
      - "INT4"
      - "GPTQ"
      - "AWQ"
      - "smoothquant"
      - "tensor parallel"
      - "pipeline parallel"
      - "expert parallel"
      - "MoE"
      - "mixture of experts"
      - "speculative decoding"
      - "continuous batching"
      - "prefill"
      - "vLLM"
      - "TensorRT-LLM"
      - "model parallel"
      - "sequence parallel"
      - "activation checkpointing"

  - id: "post-training"
    name: "Post-Training 与对齐优化"
    description: "关注LLM后训练阶段的方法与工程：RLHF、DPO/GRPO/PPO、SFT、指令微调、偏好优化、reward model、对齐训练的工程实现与效率优化。"
    keywords:
      - "RLHF"
      - "reinforcement learning from human feedback"
      - "DPO"
      - "direct preference optimization"
      - "GRPO"
      - "PPO"
      - "reward model"
      - "reward hacking"
      - "preference learning"
      - "instruction tuning"
      - "instruction following"
      - "supervised fine-tuning"
      - "SFT"
      - "alignment"
      - "RLAIF"
      - "constitutional AI"
      - "fine-tuning"
      - "LoRA"
      - "QLoRA"
      - "adapter"
      - "parameter-efficient"
      - "PEFT"
      - "post-training"
      - "human feedback"
      - "preference optimization"

  - id: "deterministic-llm"
    name: "确定性LLM与可复现推理"
    description: "关注LLM推理的确定性、可复现性与一致性：确定性采样/解码、数值一致性、分布式执行一致性、容错与回放、可验证推理流水线。偏系统与工程实现。"
    keywords:
      - "deterministic"
      - "reproducible"
      - "reproducibility"
      - "bitwise"
      - "bitwise reproducible"
      - "numerical determinism"
      - "floating-point"
      - "non-determinism"
      - "inference determinism"
      - "distributed inference"
      - "checkpoint"
      - "fault tolerance"
      - "replay"
      - "execution consistency"
      - "seed control"
      - "sampling determinism"
      - "speculative decoding"

  - id: "ann-retrieval-systems"
    name: "ANNS与检索系统（偏系统/落地）"
    description: "关注向量检索/ANNS的系统与工程：图索引/磁盘索引、GPU/CPU协同、分布式检索、动态更新、成本-延迟-召回权衡、Serving与多租户。排除纯新算法/纯理论。"
    keywords:
      - "approximate nearest neighbor"
      - "ANNS"
      - "vector search"
      - "vector database"
      - "similarity search"
      - "HNSW"
      - "DiskANN"
      - "IVF"
      - "product quantization"
      - "graph index"
