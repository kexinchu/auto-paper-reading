topics:
  - id: "llm-opt"
    name: "大语言模型训练与推理系统优化"
    description: "关注LLM训练/推理的系统级优化：KV-Cache、Attention加速、量化/稀疏/剪枝的工程落地、并行与调度、Serving系统、端到端吞吐/延迟优化。排除纯算法型压缩、纯理论分析、以及在法律/生物/金融等垂直领域的LLM应用。"
    keywords:
      # Serving 系统
      - "LLM serving"
      - "LLM inference"
      - "inference system"
      - "inference engine"
      - "serving throughput"
      - "serving latency"
