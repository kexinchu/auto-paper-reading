  - id: "systems-memory"
    name: "计算机系统、内存与互连（含AI基础设施）"
    description: "关注系统架构与内存/互连：CXL、RDMA、内存管理、分布式系统、存储栈，特别偏向支撑AI/检索/Serving的基础设施。排除纯网络安全、纯OS内核、纯数据库优化。"
    keywords:
