  - id: "rag-systems"
    name: "RAG与检索增强生成系统"
    description: "关注RAG端到端系统：检索-重排-生成流水线、缓存与一致性、索引更新、成本控制、端到端延迟优化。排除纯检索算法和纯NLP任务。"
    keywords:
      - "retrieval-augmented generation"
      - "RAG"
      - "retrieval augmented"
      - "context compression"
      - "chunking"
      - "reranking"
      - "re-ranking"
      - "dense retrieval"
