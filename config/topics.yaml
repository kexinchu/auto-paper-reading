  - id: "deterministic-llm"
    name: "确定性LLM与可复现推理"
    description: "关注LLM推理的确定性、可复现性与一致性：确定性采样/解码、数值一致性、分布式执行一致性、容错与回放、可验证推理流水线。偏系统与工程实现。"
    keywords:
