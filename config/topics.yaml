  - id: "agent-tools"
    name: "Agent与工具化推理系统"
    description: "关注Agent的系统与工具调用：tool-use、function calling、工具路由/选择、多Agent协作、任务编排、沙箱执行。排除纯RL训练、纯规划算法、以及把agent一词用于非LLM领域（如robotics agent）的论文。"
