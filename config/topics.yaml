  - id: "ai-skills"
    name: "AI Skills与能力扩展框架"
    description: "关注AI系统的技能/能力扩展机制：MCP协议、skills/plugins系统、AI工具生态、上下文工程（context engineering）、prompt工程的系统化方法。"
